<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="theme-color" content="#fafafa" id="theme-color-meta">
<link rel="apple-touch-icon" href="icon.png">
<title>Timetable</title>
<style>
/* ══════════════════════════════════════
   THEME VARIABLES
══════════════════════════════════════ */
:root{
  --bg:#fafafa;--sur:#fff;--sur2:#f0f0f0;--brd:#e0e0e0;
  --acc:#222;--acc2:#555;--txt:#111;--mut:#888;
  --red:#e53935;--grn:#43a047;--yel:#f9a825;--ora:#fb923c;
  --acc-rgb:34,34,34;--acc2-rgb:85,85,85;
  /* Liquid Glass – 明るいテーマ用 */
  --lg-bg:rgba(255,255,255,0.65);
  --lg-brd:rgba(0,0,0,0.08);
  --lg-sep:rgba(0,0,0,0.06);
  --lg-blur:blur(24px) saturate(160%);
  --lg-top-shine:rgba(255,255,255,0.90);
  --lg-shadow-up:0 -1px 0 rgba(0,0,0,0.05);
  --lg-shadow-down:0 1px 0 rgba(0,0,0,0.05);
  --lg-txt:rgba(0,0,0,0.55);
  --lg-acc:var(--acc);
}
.th-minimal {--bg:#fafafa;--sur:#fff;--sur2:#f0f0f0;--brd:#e0e0e0;--acc:#222;--acc2:#555;--txt:#111;--mut:#888;--acc-rgb:34,34,34;--acc2-rgb:85,85,85;--lg-bg:rgba(252,252,252,0.68);--lg-brd:rgba(0,0,0,0.08);--lg-sep:rgba(0,0,0,0.06);--lg-top-shine:rgba(255,255,255,0.92);--lg-txt:rgba(0,0,0,0.52);--lg-shadow-up:0 -1px 0 rgba(0,0,0,0.05);--lg-shadow-down:0 1px 0 rgba(0,0,0,0.05)}
.th-slate   {--bg:#f0f2f5;--sur:#fff;--sur2:#e4e8ee;--brd:#cdd3dc;--acc:#4f5ee8;--acc2:#7b89f0;--txt:#1a1d2e;--mut:#6b7280;--acc-rgb:79,94,232;--acc2-rgb:123,137,240;--lg-bg:rgba(240,242,248,0.70);--lg-brd:rgba(79,94,232,0.12);--lg-sep:rgba(79,94,232,0.08);--lg-top-shine:rgba(255,255,255,0.85);--lg-txt:rgba(26,29,46,0.55);--lg-shadow-up:0 -1px 0 rgba(79,94,232,0.08);--lg-shadow-down:0 1px 0 rgba(79,94,232,0.06)}
.th-pearl   {--bg:#faf8f5;--sur:#fff;--sur2:#f2ede8;--brd:#e8ddd4;--acc:#b07a5a;--acc2:#c9967a;--txt:#2a1f1a;--mut:#9a8880;--acc-rgb:176,122,90;--acc2-rgb:201,150,122;--lg-bg:rgba(250,248,245,0.70);--lg-brd:rgba(176,122,90,0.12);--lg-sep:rgba(176,122,90,0.08);--lg-top-shine:rgba(255,255,255,0.85);--lg-txt:rgba(42,31,26,0.52);--lg-shadow-up:0 -1px 0 rgba(176,122,90,0.06);--lg-shadow-down:0 1px 0 rgba(176,122,90,0.05)}
.th-fog     {--bg:#f2f4f7;--sur:#fff;--sur2:#e6eaf0;--brd:#cdd4e0;--acc:#4a6a8a;--acc2:#6a8aaa;--txt:#1a2535;--mut:#7a8898;--acc-rgb:74,106,138;--acc2-rgb:106,138,170;--lg-bg:rgba(242,244,248,0.70);--lg-brd:rgba(74,106,138,0.12);--lg-sep:rgba(74,106,138,0.07);--lg-top-shine:rgba(255,255,255,0.82);--lg-txt:rgba(26,37,53,0.52);--lg-shadow-up:0 -1px 0 rgba(74,106,138,0.06);--lg-shadow-down:0 1px 0 rgba(74,106,138,0.05)}
.th-ivory   {--bg:#fdfbf5;--sur:#fffef9;--sur2:#f5f0e4;--brd:#e8e0cc;--acc:#a07840;--acc2:#c09858;--txt:#2a2010;--mut:#9a8868;--acc-rgb:160,120,64;--acc2-rgb:192,152,88;--lg-bg:rgba(253,251,245,0.70);--lg-brd:rgba(160,120,64,0.12);--lg-sep:rgba(160,120,64,0.07);--lg-top-shine:rgba(255,255,255,0.88);--lg-txt:rgba(42,32,16,0.52);--lg-shadow-up:0 -1px 0 rgba(160,120,64,0.06);--lg-shadow-down:0 1px 0 rgba(160,120,64,0.05)}
.th-obsidian{--bg:#0a0a0f;--sur:#12121a;--sur2:#1a1a25;--brd:#252535;--acc:#3d9cf0;--acc2:#6ab8f7;--txt:#e8eaf0;--mut:#7a8098;--acc-rgb:61,156,240;--acc2-rgb:106,184,247;--lg-bg:rgba(12,12,20,0.78);--lg-brd:rgba(255,255,255,0.10);--lg-sep:rgba(255,255,255,0.07);--lg-top-shine:rgba(255,255,255,0.10);--lg-txt:rgba(232,234,240,0.60);--lg-shadow-up:0 -1px 0 rgba(0,0,0,0.50);--lg-shadow-down:0 1px 0 rgba(0,0,0,0.40)}
.th-charcoal{--bg:#1e2028;--sur:#262830;--sur2:#2e3038;--brd:#383a45;--acc:#4ecba8;--acc2:#72dbbe;--txt:#dde0e8;--mut:#8890a0;--acc-rgb:78,203,168;--acc2-rgb:114,219,190;--lg-bg:rgba(24,26,34,0.80);--lg-brd:rgba(78,203,168,0.14);--lg-sep:rgba(78,203,168,0.08);--lg-top-shine:rgba(255,255,255,0.07);--lg-txt:rgba(221,224,232,0.55);--lg-shadow-up:0 -1px 0 rgba(0,0,0,0.40);--lg-shadow-down:0 1px 0 rgba(0,0,0,0.32)}
.th-midnite {--bg:#0f1225;--sur:#161a35;--sur2:#1e2240;--brd:#2a2f55;--acc:#9b7fe8;--acc2:#b89df0;--txt:#e0e2f0;--mut:#8085b0;--acc-rgb:155,127,232;--acc2-rgb:184,157,240;--lg-bg:rgba(14,16,32,0.82);--lg-brd:rgba(155,127,232,0.18);--lg-sep:rgba(155,127,232,0.10);--lg-top-shine:rgba(155,127,232,0.12);--lg-txt:rgba(224,226,240,0.55);--lg-shadow-up:0 -1px 0 rgba(0,0,0,0.50);--lg-shadow-down:0 1px 0 rgba(0,0,0,0.40)}
.th-ash     {--bg:#141a24;--sur:#1c2430;--sur2:#242e3c;--brd:#2e3c50;--acc:#7ab8d8;--acc2:#a0d0e8;--txt:#e0eaf4;--mut:#7090a8;--acc-rgb:122,184,216;--acc2-rgb:160,208,232;--lg-bg:rgba(18,22,30,0.80);--lg-brd:rgba(122,184,216,0.14);--lg-sep:rgba(122,184,216,0.08);--lg-top-shine:rgba(255,255,255,0.06);--lg-txt:rgba(224,234,244,0.55);--lg-shadow-up:0 -1px 0 rgba(0,0,0,0.45);--lg-shadow-down:0 1px 0 rgba(0,0,0,0.35)}
.th-onyx    {--bg:#080808;--sur:#111;--sur2:#1a1a1a;--brd:#222;--acc:#e82020;--acc2:#f55050;--txt:#f0f0f0;--mut:#808080;--acc-rgb:232,32,32;--acc2-rgb:245,80,80;--lg-bg:rgba(6,6,6,0.84);--lg-brd:rgba(232,32,32,0.20);--lg-sep:rgba(232,32,32,0.10);--lg-top-shine:rgba(255,255,255,0.04);--lg-txt:rgba(240,240,240,0.52);--lg-shadow-up:0 -1px 0 rgba(0,0,0,0.60);--lg-shadow-down:0 1px 0 rgba(0,0,0,0.50)}

/* ══════════════════════════════════════
   RESET & BASE
══════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* html: safe-area-top / side を html に集約, bottom はタブバーが処理 */
html{
  position:fixed;inset:0;           /* 画面ぴったり固定でスクロール除去 */
  padding-top:env(safe-area-inset-top);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
  background:var(--bg);
  overflow:hidden;
}
body{
  width:100%;height:100%;
  background:var(--bg);
  color:var(--txt);
  font-family:-apple-system,'Helvetica Neue',sans-serif;
  display:flex;flex-direction:column;
  overflow:hidden;
  position:relative;
}

/* ══════════════════════════════════════
   CALENDAR VIEW  ─  全画面グリッド
══════════════════════════════════════ */
#vcal{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.cal-bg{                            /* グリッドが占める全域 */
  flex:1;overflow:hidden;
  padding:0;                        /* ← バーの高さ分は JS で設定 */
}
.cal{display:grid;gap:3px;height:100%}

.cal-hd{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px 0}
.cal-hd-day{font-size:10px;font-weight:700;color:var(--mut);line-height:1.3}
.cal-hd-date{font-size:13px;font-weight:700;color:var(--txt);width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;border-radius:50%}
.cal-hd-date.today{background:var(--acc);color:#fff}
.tcol{display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-start;padding:5px 3px 0 0}
.tcol-p{font-weight:700;font-size:10px;color:var(--txt);line-height:1.3}
.tcol-t{font-size:8px;color:var(--mut);line-height:1.3;white-space:pre;text-align:right}
.cell{background:var(--sur);border:1px solid var(--brd);border-radius:5px;
  position:relative;cursor:pointer;overflow:hidden;transition:background .12s}
.cell:active{background:var(--sur2)}
.cblk{position:absolute;inset:2px;border-radius:3px;padding:2px 3px;display:flex;flex-direction:column;overflow:hidden}
.cblk-name{font-size:10px;font-weight:700;line-height:1.25;overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;flex-shrink:0}
.cblk-sp{flex:1;min-height:0}
.cblk-room{font-size:8px;opacity:.8;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;flex-shrink:0}
.cblk-dot{position:absolute;top:2px;right:2px;width:5px;height:5px;border-radius:50%;background:var(--yel)}
.ev-dot{position:absolute;bottom:1px;left:2px;right:2px;font-size:7px;color:var(--acc2);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.memo-blk{position:absolute;inset:2px;border-radius:3px;padding:2px 4px;background:rgba(249,168,37,.12);border-left:2px solid var(--yel);overflow:hidden}
.memo-txt{font-size:8px;color:var(--yel);line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.c0{background:rgba(124,106,247,.22);border-left:3px solid #7c6af7}
.c1{background:rgba(94,234,212,.18);border-left:3px solid #5eead4}
.c2{background:rgba(251,191,36,.18);border-left:3px solid #fbbf24}
.c3{background:rgba(248,113,113,.18);border-left:3px solid #f87171}
.c4{background:rgba(74,222,128,.18);border-left:3px solid #4ade80}
.c5{background:rgba(251,146,60,.18);border-left:3px solid #fb923c}
.c6{background:rgba(232,121,249,.18);border-left:3px solid #e879f9}
.c7{background:rgba(56,189,248,.18);border-left:3px solid #38bdf8}

/* ── コントロールチップ（右上フロート） ── */
.ctrl-chip{
  display:flex;align-items:center;gap:4px;
  padding:5px 10px;border-radius:20px;
  font-size:11px;font-weight:600;
  color:var(--acc);
  background:var(--lg-bg);
  backdrop-filter:var(--lg-blur);
  -webkit-backdrop-filter:var(--lg-blur);
  border:1px solid var(--lg-brd);
  box-shadow:inset 0 1px 0 var(--lg-top-shine),0 2px 8px rgba(0,0,0,0.12);
  cursor:pointer;transition:opacity .15s;white-space:nowrap;
}
.ctrl-chip:active{opacity:.6}
.dtgl{
  font-size:10px;padding:3px 8px;border-radius:20px;
  border:1px solid rgba(var(--acc-rgb),0.20);cursor:pointer;
  font-weight:600;white-space:nowrap;
  background:var(--lg-bg);
  backdrop-filter:var(--lg-blur);-webkit-backdrop-filter:var(--lg-blur);
}
.dtgl.on{background:var(--acc);color:#fff;border-color:transparent}
.dtgl.off{color:var(--mut)}
.chip{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap}
.chip-q{background:rgba(var(--acc-rgb),.18);color:var(--acc)}
.chip-s{background:rgba(var(--acc-rgb),.12);color:var(--acc)}
.chip-h{background:rgba(var(--acc2-rgb),.2);color:var(--acc2)}

/* ══════════════════════════════════════
   FLOATING ISLAND TAB BAR  v231
══════════════════════════════════════ */

/* wrapper：safe-area確保のみ */
.lg-bottom{
  position:absolute;bottom:0;left:0;right:0;
  z-index:50;background:none;border:none;
  padding-bottom:env(safe-area-inset-bottom);
  height:calc(72px + env(safe-area-inset-bottom));
  pointer-events:none;
}

/* アイランド本体 */
.tab-island{
  position:absolute;
  bottom:10px;left:50%;
  transform:translateX(-50%) scale(1);
  transform-origin:center bottom;
  pointer-events:auto;
  display:flex;align-items:center;
  padding:0 6px;
  height:56px;
  border-radius:28px;
  /* 強力ブラー */
  background:var(--lg-bg);
  backdrop-filter:blur(44px) saturate(210%);
  -webkit-backdrop-filter:blur(44px) saturate(210%);
  /* 0.5px 極細ベゼル */
  border:0.5px solid var(--lg-brd);
  box-shadow:
    inset 0 0.5px 0 var(--lg-top-shine),
    inset 0 -0.5px 0 rgba(0,0,0,0.05),
    0 10px 56px rgba(0,0,0,0.14),
    0 4px 16px rgba(0,0,0,0.08),
    0 1px 3px rgba(0,0,0,0.05);
  /* 幅モーフ＋タッチ時スケール */
  transition:
    width .38s cubic-bezier(.34,1.26,.64,1),
    transform .22s cubic-bezier(.34,1.56,.64,1);
  overflow:visible; /* ピルのはみ出し許容 */
  white-space:nowrap;
  will-change:transform;
}
/* タッチ中に少し大きくなる */
.tab-island.pressed{
  transform:translateX(-50%) scale(1.04);
}

/* 液体ピル: WebGL描画 */

/* タブボタン */
.tab-item{
  flex:0 0 auto;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:5px;
  width:80px;height:52px;
  padding:7px 0 5px;
  cursor:pointer;border:none;background:none;
  color:var(--lg-txt);
  font-size:9px;
  font-weight:500;font-family:inherit;
  -webkit-user-select:none;user-select:none;
  position:relative;z-index:1;
  border-radius:24px;
  pointer-events:auto;
  /* colorはJSでclip-pathを使って部分的に切り替えるためtransitionなし */
}

.tab-icon{
  width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1);
  position:relative;z-index:1;
}
.tab-item.on .tab-icon{transform:scale(1.10) translateY(-1px)}
.tab-item:active .tab-icon{transform:scale(.82)}

.tab-icon svg{
  width:20px;height:20px;
  stroke:currentColor;fill:none;
  stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;
  transition:stroke-width .22s;
}
.tab-item.on .tab-icon svg{stroke-width:2.3}

.tab-label{
  font-size:9px;font-weight:500;
  position:relative;z-index:1;
  opacity:.60;line-height:1;letter-spacing:.01em;
}
.tab-item.on .tab-label{font-weight:700;opacity:1}

/* ══════════════════════════════════════
   ASSIGN / SETTINGS VIEWS  ─  通常レイアウト
══════════════════════════════════════ */
#vassign,#vsettings{
  position:absolute;inset:0;
  display:none;flex-direction:column;
  overflow:hidden;
}
.view-scroll{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
}

/* solid ヘッダー（課題・設定ビュー用） */
.solid-hdr{
  flex-shrink:0;
  background:var(--sur);
  border-bottom:1px solid var(--brd);
  padding:11px 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.solid-hdr-title{font-size:17px;font-weight:700;color:var(--acc)}

/* tab bar placeholder: 下のタブバー分のスペース確保 */
.tab-spacer{flex-shrink:0}

/* Assignments */
.alist{padding:10px;display:flex;flex-direction:column;gap:6px}
.aitem{background:var(--sur);border:1px solid var(--brd);border-radius:10px;
  padding:10px 12px;display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.achk{width:20px;height:20px;border-radius:50%;border:2px solid var(--brd);cursor:pointer;
  flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.achk.done{background:var(--grn);border-color:var(--grn)}
.achk.done::after{content:'✓';font-size:10px;color:#fff;font-weight:900}
.ainfo{flex:1;min-width:0}
.aname{font-size:13px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.aname.done{text-decoration:line-through;opacity:.5}
.ameta{font-size:11px;color:var(--mut);margin-top:2px}
.anote{font-size:11px;color:var(--mut);margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.adue{font-size:10px;margin-top:3px;padding:1px 6px;border-radius:20px;display:inline-block}
.due-ov{background:rgba(229,57,53,.15);color:var(--red)}
.due-td{background:rgba(249,168,37,.2);color:var(--yel)}
.due-sn{background:rgba(251,146,60,.18);color:var(--ora)}
.due-ok{background:rgba(67,160,71,.15);color:var(--grn)}
.adel{background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;font-weight:600;padding:4px 6px;flex-shrink:0;align-self:center}

/* Settings */
.slist{padding:10px;display:flex;flex-direction:column;gap:12px}
.ssec{background:var(--sur);border:1px solid var(--brd);border-radius:12px;overflow:hidden}
.ssec-hdr{padding:10px 14px;font-size:13px;font-weight:700;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.srow{padding:9px 14px;border-bottom:1px solid var(--brd);display:flex;align-items:center;cursor:pointer}
.srow:last-child{border-bottom:none}
.srow-l{flex:1;min-width:0}
.srow-name{font-weight:600;font-size:13px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.srow-sub{font-size:10px;color:var(--mut);margin-top:1px}
.sbadge{font-size:10px;padding:2px 7px;border-radius:20px;white-space:nowrap;margin-left:8px;flex-shrink:0}
.bq{background:rgba(var(--acc-rgb),.18);color:var(--acc)}
.bs{background:rgba(var(--acc-rgb),.12);color:var(--acc)}
.bh{background:rgba(var(--acc2-rgb),.2);color:var(--acc2)}
.be{background:rgba(var(--acc2-rgb),.18);color:var(--acc2)}
.tgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:14px}
.tswatch{height:36px;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:border-color .2s}
.tswatch.on{border-color:var(--txt)}
.tlabel{font-size:10px;color:var(--mut);text-align:center;margin-top:4px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--brd)}
.toggle-row:last-child{border-bottom:none}
.toggle-row span{font-size:13px}
.toggle-btn{font-size:12px;padding:4px 14px;border-radius:20px;border:1px solid var(--brd);cursor:pointer;font-weight:600}
.toggle-btn.on{background:var(--acc);color:#fff;border-color:var(--acc)}
.toggle-btn.off{background:var(--sur2);color:var(--mut)}

/* ══════════════════════════════════════
   MODALS & SHEETS
══════════════════════════════════════ */
.sh-ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.sh{background:var(--sur);border-radius:20px 20px 0 0;width:100%;max-width:600px;
  padding:14px 14px max(20px,env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:8px}
.sh-title{font-size:12px;color:var(--mut);text-align:center;margin-bottom:4px}
.sh-btn{background:var(--sur2);border:none;color:var(--txt);border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;width:100%;transition:opacity .15s}
.sh-btn.acc{background:var(--acc);color:#fff}
.sh-btn:active,.sh-cancel:active{opacity:.65}
.sh-cancel{background:none;border:none;color:var(--mut);border-radius:12px;padding:12px;font-size:15px;cursor:pointer;width:100%;text-align:center;transition:opacity .15s}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.ov.mid{align-items:center}
.modal{background:var(--sur);border-radius:20px 20px 0 0;width:100%;max-width:600px;
  max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:18px 14px max(24px,env(safe-area-inset-bottom))}
.ov.mid .modal{border-radius:16px;margin:12px;max-height:86vh;width:calc(100% - 24px);padding-bottom:24px;align-self:center}
.drag{width:36px;height:4px;background:var(--brd);border-radius:2px;margin:0 auto 14px}
.modal h2{font-size:17px;font-weight:700;margin-bottom:14px}
.dsec{margin-bottom:14px}
.dlbl{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.dval{font-size:14px}.dval a{color:var(--acc2);text-decoration:none}
.arow{display:flex;align-items:center;gap:8px;background:var(--sur2);border-radius:8px;padding:7px 10px}
.arow-chk{width:18px;height:18px;border-radius:50%;border:2px solid var(--brd);cursor:pointer;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.arow-chk.done{background:var(--grn);border-color:var(--grn)}
.arow-chk.done::after{content:'✓';font-size:9px;color:#fff;font-weight:900}
.arow-i{flex:1;min-width:0}
.arow-n{font-size:13px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.arow-d{font-size:10px;color:var(--mut)}
.arows{display:flex;flex-direction:column;gap:5px;margin-top:6px}
.fg{margin-bottom:12px}
.fg label{font-size:11px;color:var(--mut);margin-bottom:4px;display:block}
.fg input,.fg select,.fg textarea{width:100%;background:var(--sur2);border:1px solid var(--brd);color:var(--txt);
  border-radius:8px;padding:9px 11px;font-size:14px;outline:none;-webkit-appearance:none;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--acc)}
.fg textarea{resize:vertical;min-height:64px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:11px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;width:100%;transition:opacity .2s}
.btn:active{opacity:.72}
.btn-p{background:var(--acc);color:#fff}
.btn-d{background:var(--red);color:#fff}
.btn-s{background:var(--sur2);color:var(--txt);border:1px solid var(--brd)}
.btn-row{display:flex;gap:8px;margin-top:14px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sec-hdr span{font-size:13px;font-weight:600}
.add-sm{background:var(--sur2);border:1px solid var(--brd);color:var(--acc);border-radius:6px;padding:3px 9px;font-size:12px;cursor:pointer}
.empty{text-align:center;padding:36px 20px;color:var(--mut);font-size:13px}
.warnbox{background:rgba(249,168,37,.1);border:1px solid rgba(249,168,37,.3);border-radius:8px;
  padding:8px 10px;font-size:12px;color:var(--yel);margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between}
.crow{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.csw{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent}
.csw.on{border-color:var(--txt)}

/* pill-overlay アクティブ色レイヤー */
.tab-overlay-item{
  flex:0 0 auto;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:5px;
  width:80px;height:52px;
  padding:7px 0 5px;
  pointer-events:none;
}
.toi-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.toi-label{font-size:9px;font-weight:700;color:var(--acc);line-height:1;letter-spacing:.01em}
</style>
</head>

<script>
'use strict';
/* ══════════ DB ══════════ */
const DB_KEY='tt_v9';
let D={classes:[],assignments:[],scheds:[],quarters:[],periods:[],events:[],memos:[],
  theme:'minimal',showSat:true,showSun:false,weekOverrides:{}};
function dbLoad(){try{const s=localStorage.getItem(DB_KEY);if(s)Object.assign(D,JSON.parse(s));}catch(e){}}
function dbSave(){try{localStorage.setItem(DB_KEY,JSON.stringify(D));}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

/* ══════════ DATE ══════════ */
const DAYS_ALL=['月','火','水','木','金','土','日'];
const PLBLS=['1限','2限','3限','4限','5限'];
const PTIMES=['8:30\n〜10:00','10:20\n〜11:50','12:40\n〜14:10','14:30\n〜16:00','16:20\n〜17:50'];
const CCOLORS=['#7c6af7','#5eead4','#fbbf24','#f87171','#4ade80','#fb923c','#e879f9','#38bdf8'];
function dstr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function dparse(s){return new Date(s+'T00:00:00');}
function dfmt(s){if(!s)return'';const d=dparse(s);return(d.getMonth()+1)+'/'+d.getDate();}
let weekOffset=0;
function getMonday(off){const n=new Date();n.setHours(0,0,0,0);const dw=n.getDay();n.setDate(n.getDate()+(dw===0?1:1-dw)+off*7);return n;}
function getWeekDates(off){const m=getMonday(off);return Array.from({length:7},(_,i)=>dstr(new Date(m.getFullYear(),m.getMonth(),m.getDate()+i)));}
function weekKey(off){return dstr(getMonday(off));}
function getVisibleDays(wk){const o=D.weekOverrides[wk]||{};const sat=o.sat!==undefined?o.sat:D.showSat;const sun=o.sun!==undefined?o.sun:D.showSun;const d=[0,1,2,3,4];if(sat)d.push(5);if(sun)d.push(6);return d;}
function dueFmt(s){const d=dparse(s);const t=new Date();t.setHours(0,0,0,0);const df=Math.round((d-t)/86400000);if(df<0)return{txt:Math.abs(df)+'日超過',cls:'due-ov'};if(df===0)return{txt:'今日締切',cls:'due-td'};if(df===1)return{txt:'明日締切',cls:'due-sn'};if(df<=3)return{txt:dfmt(s)+'まで',cls:'due-sn'};return{txt:dfmt(s)+'まで',cls:'due-ok'};}

/* ══════════ BUSINESS ══════════ */
function repId(cid){if(!cid)return null;const c=D.classes.find(x=>x.id===cid);if(!c||!c.code||!c.code.trim())return cid;const g=D.classes.filter(x=>x.code&&x.code.trim()===c.code.trim());g.sort((a,b)=>a.id.localeCompare(b.id));return g[0].id;}
function classAssigns(cls){const rid=repId(cls.id);return D.assignments.filter(a=>a.classId===rid);}
function qIdsFor(ds){return D.quarters.filter(q=>q.start<=ds&&ds<=q.end).map(q=>q.id);}
function isHol(ds){return D.periods.some(p=>p.type==='holiday'&&p.start<=ds&&ds<=p.end);}
function eventsFor(ds){return D.events.filter(e=>e.start<=ds&&ds<=(e.end||e.start));}

function hexToRgba(h,a){return 'rgba('+hexToRgb(h)+','+a+')';}

/* ══════════ LAYOUT ══════════ */
const TABS=['cal','assign','settings'];
const TAB_W=80;
const PAD=6;
const PILL_MARGIN=6;
const ISLAND_H=56;
const PILL_BASE_H=ISLAND_H-PILL_MARGIN*2;

function applyBarPadding(){
  const bot=document.getElementById('lg-bottom');
  const botH=bot.offsetHeight;

  // 上部：コントロール群（cal-controls）の下端 + 余白
  const ctrl=document.getElementById('cal-controls');
  const topPad=ctrl?(ctrl.offsetTop+ctrl.offsetHeight+6):8;

  // cal-bg のパディング：上=コントロール下端、下=タブバー高さ
  document.getElementById('cal-bg').style.padding=topPad+'px 8px '+botH+'px';

  ['assign-tab-spacer','settings-tab-spacer'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.style.height=botH+'px';
  });
  sizeIsland();
}

function sizeIsland(){
  const island=document.getElementById('tab-island');
  if(!island)return;
  island.style.width=(TABS.length*TAB_W+PAD*2)+'px';
  pillGl.setInstant(TABS.indexOf(_tab));
}

/* pill-overlay の clip-path をピルの実座標に合わせて更新 */
/* pill-overlay は tab-island と同じ座標系なのでズレなし */
function updateClipPaths(pillLeft, pillWidth, pillTop, pillHeight){
  const overlay=document.getElementById('pill-overlay');
  if(!overlay)return;
  const pH=pillHeight||PILL_BASE_H;
  const pT=pillTop||PILL_MARGIN;
  const r=pH/2; // カプセル形の半径

  // ピル形状の SVG path（tab-island 座標系）
  const x1=pillLeft, y1=pT, x2=pillLeft+pillWidth, y2=pT+pH;
  const cr=Math.min(r,(x2-x1)/2);
  const path=`M ${x1+cr},${y1} L ${x2-cr},${y1} `+
    `Q ${x2},${y1} ${x2},${y1+cr} `+
    `L ${x2},${y2-cr} `+
    `Q ${x2},${y2} ${x2-cr},${y2} `+
    `L ${x1+cr},${y2} `+
    `Q ${x1},${y2} ${x1},${y2-cr} `+
    `L ${x1},${y1+cr} `+
    `Q ${x1},${y1} ${x1+cr},${y1} Z`;

  overlay.style.clipPath='path("'+path+'")';
}


/* ハプティクス */
function haptic(){
  if(navigator.vibrate)navigator.vibrate(5);
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const g=ac.createGain();g.gain.setValueAtTime(0.0008,ac.currentTime);
    const o=ac.createOscillator();o.frequency.value=900;
    o.connect(g);g.connect(ac.destination);
    o.start();o.stop(ac.currentTime+0.010);
  }catch(e){}
}

/* WebGL PILL RENDERER */
const pillGl=(function(){
  let canvas,gl,prog,_raf=0;
  const state={
    left:PAD,width:TAB_W,top:PILL_MARGIN,height:PILL_BASE_H,
    targetLeft:PAD,targetWidth:TAB_W,targetTop:PILL_MARGIN,targetHeight:PILL_BASE_H,
    vLeft:0,vWidth:0,vTop:0,vHeight:0,
    lensStrength:0,prismStrength:0,
    _pad:20,_dpr:1,
  };

  const VS='attribute vec2 a_pos;void main(){gl_Position=vec4(a_pos,0,1);}';

  const FS=[
'precision highp float;',
'uniform vec2 u_res;',
'uniform vec4 u_pill;',   // x,y,w,h (canvas px, top-left)
'uniform float u_radius;',
'uniform float u_lens;',  // 0=歪みなし 1=最大歪み
'uniform float u_prism;', // 0=分光なし 1=最大
'uniform vec3 u_acc;',
'uniform float u_time;',
// SDF
'float sdRR(vec2 p,vec2 b,float r){vec2 q=abs(p)-b+r;return length(max(q,0.0))+min(max(q.x,q.y),0.0)-r;}',
// ノイズ
'float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}',
'float noise(vec2 p){vec2 i=floor(p),f=fract(p);vec2 u=f*f*(3.0-2.0*f);return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);}',
'float fbm(vec2 p){float v=0.0,a=0.5;for(int i=0;i<4;i++){v+=a*noise(p);p*=2.1;a*=0.5;}return v;}',
// 虹色
'vec3 rainbow(float t){return vec3(0.5+0.5*cos(6.283*(t)),0.5+0.5*cos(6.283*(t+0.333)),0.5+0.5*cos(6.283*(t+0.667)));}',
'void main(){',
'  vec2 p=vec2(gl_FragCoord.x, u_res.y-gl_FragCoord.y);',
'  vec2 pc=vec2(u_pill.x+u_pill.z*0.5, u_pill.y+u_pill.w*0.5);',
'  vec2 ph=vec2(u_pill.z*0.5, u_pill.w*0.5);',
'  vec2 lUV=(p-pc)/max(ph,vec2(1.0));', // -1〜1
'  float dist=sdRR(p-pc, ph, u_radius);',
'  float mask=1.0-smoothstep(-1.5,1.5,dist);',
'  if(mask<0.001){gl_FragColor=vec4(0);return;}',
// 境界からの距離（0=中心、1=縁）
'  float edgeFactor=1.0-smoothstep(0.0,1.0,(-dist)/(min(ph.x,ph.y)));', // 縁ほど1
// fresnel（縁6px以内）
'  float fresnel=1.0-smoothstep(0.0,6.0,abs(dist));',
// ノイズ歪み：境界部のみ・lens=0なら無効
'  float lensAtEdge=u_lens*edgeFactor;',  // 中心はゼロ、縁ほど強い
'  vec2 nUV=lUV*3.0+vec2(u_time*0.10,u_time*0.07);',
'  float nx=fbm(nUV)*2.0-1.0;',
'  float ny=fbm(nUV+vec2(3.7,1.3))*2.0-1.0;',
// ベース：すりガラス（lens=0でも常に表示）
'  vec3 col=u_acc;',
'  float alpha=0.11+fresnel*0.09;',
// 上縁シャイン（常時）
'  float shine=smoothstep(0.0,0.35,-lUV.y)*smoothstep(-0.8,0.2,-abs(lUV.x));',
'  col+=vec3(shine*0.50);alpha+=shine*0.16;',
// 歪みハイライト（lens>0かつ境界部のみ）
'  float rimG=pow(fresnel,1.5)*lensAtEdge*0.7;',
'  col+=vec3(rimG);alpha+=rimG*0.35;',
// 虹色分光（境界部・prism>0時のみ）
'  float pT=atan(lUV.y,lUV.x)/6.283+0.5+u_time*0.05;',
'  vec3 pCol=rainbow(pT);',
'  float pMask=fresnel*u_prism*lensAtEdge;', // 境界部のみ
'  col=mix(col,pCol,pMask*0.75);alpha+=pMask*0.18;',
// 合成
'  alpha=clamp(alpha,0.0,0.92)*mask;',
'  float softEdge=smoothstep(0.0,1.5,dist+1.5);',
'  alpha*=(1.0-softEdge*0.5);',
'  gl_FragColor=vec4(col*alpha,alpha);',
'}'
  ].join('\n');


  function mkSh(type,src){
    const s=gl.createShader(type);
    gl.shaderSource(s,src);gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(s));
    return s;
  }

  function init(){
    canvas=document.getElementById('pill-canvas');
    if(!canvas)return false;
    gl=canvas.getContext('webgl',{alpha:true,premultipliedAlpha:true,antialias:true});
    if(!gl)return false;
    prog=gl.createProgram();
    gl.attachShader(prog,mkSh(gl.VERTEX_SHADER,VS));
    gl.attachShader(prog,mkSh(gl.FRAGMENT_SHADER,FS));
    gl.linkProgram(prog);gl.useProgram(prog);
    const buf=gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
    const loc=gl.getAttribLocation(prog,'a_pos');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.ONE,gl.ONE_MINUS_SRC_ALPHA);
    return true;
  }

  function resize(){
    if(!canvas||!gl)return;
    const island=document.getElementById('tab-island');
    if(!island)return;
    const dpr=window.devicePixelRatio||1;
    const pad=20; // はみ出し分
    const iw=island.offsetWidth;
    const ih=island.offsetHeight;
    // canvas を island の外に pad px 張り出す（overflow:visible は親で設定済み）
    canvas.style.position='absolute';
    canvas.style.top=-pad+'px';
    canvas.style.left=-pad+'px';
    canvas.style.width=(iw+pad*2)+'px';
    canvas.style.height=(ih+pad*2)+'px';
    canvas.style.pointerEvents='none';
    canvas.style.zIndex='0';
    const cw=Math.round((iw+pad*2)*dpr);
    const ch=Math.round((ih+pad*2)*dpr);
    if(canvas.width!==cw||canvas.height!==ch){
      canvas.width=cw;
      canvas.height=ch;
    }
    gl.viewport(0,0,canvas.width,canvas.height);
    state._pad=pad;state._dpr=dpr;state._iw=iw;state._ih=ih;
  }

  function getAcc(){
    const v=getComputedStyle(document.documentElement).getPropertyValue('--acc-rgb').trim();
    const p=v.split(',').map(Number);
    return p.length===3?[p[0]/255,p[1]/255,p[2]/255]:[0.133,0.133,0.133];
  }

  let _t0=null;
  function draw(ts){
    if(!gl){_raf=0;return;}
    if(!_t0)_t0=ts;
    const t=(ts-_t0)/1000;
    resize();
    const pad=state._pad,dpr=state._dpr;
    gl.clearColor(0,0,0,0);
    gl.clear(gl.COLOR_BUFFER_BIT);
    const acc=getAcc();
    const pw=state.width*dpr,ph=state.height*dpr;
    const px=(state.left+pad)*dpr,py=(state.top+pad)*dpr;
    const setU=(n,type,...v)=>{const l=gl.getUniformLocation(prog,n);if(l!=null)gl[type](l,...v);};
    setU('u_res','uniform2fv',[canvas.width,canvas.height]);
    setU('u_pill','uniform4fv',[px,py,pw,ph]);
    setU('u_radius','uniform1f',ph/2);
    setU('u_lens','uniform1f',Math.min(state.lensStrength,1.0));
    setU('u_prism','uniform1f',Math.min(state.prismStrength,1.0));
    setU('u_acc','uniform3fv',acc);
    setU('u_time','uniform1f',t);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
    _raf=requestAnimationFrame(draw);
  }

  return {
    init(){
      if(!init())return;
      resize();
      window.addEventListener('resize',resize);
      _raf=requestAnimationFrame(draw);
    },
    setInstant(idx){
      state.left=PAD+idx*TAB_W;state.width=TAB_W;
      state.top=PILL_MARGIN;state.height=PILL_BASE_H;
      state.lensStrength=0;state.prismStrength=0;
      state.vLeft=state.vWidth=state.vTop=state.vHeight=0;
      updateClipPaths(state.left,state.width,state.top,state.height);
    },
    snapTo(idx){
      state.targetLeft=PAD+idx*TAB_W;state.targetWidth=TAB_W;
      state.targetTop=PILL_MARGIN;state.targetHeight=PILL_BASE_H;
      if(!_raf)_raf=requestAnimationFrame(draw);
      const k=280,d=28,m=1;
      let last=performance.now();
      function spring(now){
        const dt=Math.min((now-last)/1000,0.05);last=now;
        function step(c,t,v){const f=-k*(c-t)-d*v;const a=f/m;const nv=v+a*dt;return[c+nv*dt,nv];}
        [state.left,state.vLeft]=step(state.left,state.targetLeft,state.vLeft);
        [state.width,state.vWidth]=step(state.width,state.targetWidth,state.vWidth);
        [state.top,state.vTop]=step(state.top,state.targetTop,state.vTop);
        [state.height,state.vHeight]=step(state.height,state.targetHeight,state.vHeight);
        state.lensStrength*=Math.pow(0.88,dt*60);
        state.prismStrength*=Math.pow(0.85,dt*60);
        updateClipPaths(state.left,state.width,state.top,state.height);
        const ok=Math.abs(state.vLeft)<0.2&&Math.abs(state.left-state.targetLeft)<0.3&&
                  Math.abs(state.vWidth)<0.2&&Math.abs(state.width-state.targetWidth)<0.3;
        if(!ok)requestAnimationFrame(spring);
      }
      requestAnimationFrame(spring);
    },
    updateDrag(l,w,t,h,lens,prism){
      state.left=l;state.width=w;state.top=t;state.height=h;
      state.lensStrength=lens;state.prismStrength=prism;
      updateClipPaths(l,w,t,h);
    },
  };
})();

/* ══════════ TAB ══════════ */
let _tab='cal';
function switchTab(t,skipHaptic){
  if(!skipHaptic)haptic();
  _tab=t;
  document.getElementById('vcal').style.display=t==='cal'?'flex':'none';
  document.getElementById('vassign').style.display=t==='assign'?'flex':'none';
  document.getElementById('vsettings').style.display=t==='settings'?'flex':'none';
  document.querySelectorAll('.tab-item').forEach(btn=>
    btn.className='tab-item'+(btn.dataset.tab===t?' on':''));
  pillGl.snapTo(TABS.indexOf(t));
  if(t==='assign')renderAssigns();
  if(t==='settings'){renderSettings();renderThemeGrid();renderGlobalToggles();}
  applyBarPadding();
}

/* ══════════ PILL DRAG ══════════ */
function initPillDrag(){
  const island=document.getElementById('tab-island');
  if(!island)return;
  let dragging=false,startX=0,baseIdx=0,lastHapticIdx=-1;
  let lastVx=0,lastT=0,lastX=0;

  function updateDrag(curX,ts){
    const dx=curX-startX;
    const dt=Math.max(ts-lastT,4);
    const vx=(curX-lastX)/dt; // px/ms
    lastVx=vx;lastT=ts;lastX=curX;

    // ── 指の位置をアイランド内座標に変換 ──
    const island=document.getElementById('tab-island');
    const ir=island.getBoundingClientRect();
    // 指のアイランド内X座標
    const fingerX=curX - ir.left;

    // ピル幅：速度で横に伸びる（小さく調整）
    const absVx=Math.abs(vx);
    const speedStr=Math.min(absVx*35, TAB_W*0.45); // 伸び量を抑える
    const pillW=TAB_W+speedStr;

    // ピルの left：指の位置がピルの中心になる（クランプ付き）
    let left=fingerX - pillW/2;
    left=Math.max(PAD, Math.min(PAD+TABS.length*TAB_W-pillW, left));

    // ピルの height：タブ間の中間地点付近で膨らむ
    // 指がどのタブの境界に近いか
    const centerIdx=(fingerX-PAD)/TAB_W; // 連続値
    const frac=centerIdx - Math.floor(centerIdx);
    const borderDist=Math.min(frac, 1-frac); // 0=境界, 0.5=中心
    const bulgeFactor=Math.max(0, 1-borderDist*4); // 境界付近だけ膨らむ
    const bulge=bulgeFactor*14; // 最大14px（小さめ）
    const pillH=PILL_BASE_H+bulge*2;
    const pillTop=PILL_MARGIN-bulge;

    // エフェクト強度
    const lens=Math.min(bulgeFactor*0.8+absVx*0.35, 1.0);
    const prism=Math.min(absVx*0.55, 1.0);

    pillGl.updateDrag(left, pillW, pillTop, pillH, lens, prism);
    updateClipPaths(left, pillW, pillTop, pillH);

    // ハプティクス：タブ境界を越えた瞬間
    const nearest=Math.round(centerIdx);
    const clampedNearest=Math.max(0,Math.min(TABS.length-1,nearest));
    if(clampedNearest!==lastHapticIdx){lastHapticIdx=clampedNearest;haptic();}
  }


  island.addEventListener('touchstart',e=>{
    if(e.touches.length!==1)return;
    dragging=true;startX=e.touches[0].clientX;
    baseIdx=TABS.indexOf(_tab);lastHapticIdx=baseIdx;
    lastX=startX;lastT=performance.now();lastVx=0;
    island.classList.add('pressed');
  },{passive:true});
  island.addEventListener('touchmove',e=>{
    if(!dragging||e.touches.length!==1)return;
    updateDrag(e.touches[0].clientX,performance.now());
  },{passive:true});
  function onEnd(cx){
    if(!dragging)return;dragging=false;
    island.classList.remove('pressed');
    // 指を離した時のアイランド内X座標から最近タブを決定
    const island=document.getElementById('tab-island');
    const ir=island.getBoundingClientRect();
    const fingerX=cx-ir.left;
    const centerIdx=(fingerX-PAD)/TAB_W;
    const ni=Math.max(0,Math.min(TABS.length-1,Math.round(centerIdx)));
    if(ni!==baseIdx)switchTab(TABS[ni],true);
    else pillGl.snapTo(baseIdx);
  }
  island.addEventListener('touchend',e=>onEnd(e.changedTouches[0].clientX),{passive:true});
  island.addEventListener('touchcancel',()=>{
    if(!dragging)return;dragging=false;
    island.classList.remove('pressed');pillGl.snapTo(baseIdx);
  },{passive:true});
  island.addEventListener('mousedown',e=>{
    dragging=true;startX=e.clientX;baseIdx=TABS.indexOf(_tab);
    lastHapticIdx=baseIdx;lastX=startX;lastT=performance.now();lastVx=0;
    island.classList.add('pressed');e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{if(!dragging)return;updateDrag(e.clientX,performance.now());});
  window.addEventListener('mouseup',e=>onEnd(e.clientX));
}

function renderGlobalToggles(){
  const sb=document.getElementById('toggle-sat-global'),su=document.getElementById('toggle-sun-global');
  if(!sb||!su)return;
  sb.textContent=D.showSat?'ON':'OFF';sb.className='toggle-btn '+(D.showSat?'on':'off');
  su.textContent=D.showSun?'ON':'OFF';su.className='toggle-btn '+(D.showSun?'on':'off');
}

/* ══════════ DAY TOGGLES ══════════ */
function renderWeekDayToggles(wk){
  const el=document.getElementById('day-toggles');if(!el)return;el.innerHTML='';
  const o=D.weekOverrides[wk]||{};
  const sat=o.sat!==undefined?o.sat:D.showSat;
  const sun=o.sun!==undefined?o.sun:D.showSun;
  function mkBtn(lbl,on,cb){const b=document.createElement('button');b.className='dtgl '+(on?'on':'off');b.textContent=lbl+(on?'ON':'OFF');b.addEventListener('click',cb);return b;}
  el.appendChild(mkBtn('土:',sat,()=>{if(!D.weekOverrides[wk])D.weekOverrides[wk]={};D.weekOverrides[wk].sat=!sat;dbSave();renderCal();}));
  el.appendChild(mkBtn('日:',sun,()=>{if(!D.weekOverrides[wk])D.weekOverrides[wk]={};D.weekOverrides[wk].sun=!sun;dbSave();renderCal();}));
  if(o.sat!==undefined||o.sun!==undefined){const r=document.createElement('button');r.className='dtgl off';r.textContent='↺';r.addEventListener('click',()=>{delete D.weekOverrides[wk];dbSave();renderCal();});el.appendChild(r);}
}

/* ══════════ RENDER CAL ══════════ */
function renderCal(){
  const allDates=getWeekDates(weekOffset);
  const wk=weekKey(weekOffset);
  const vis=getVisibleDays(wk);
  const dates=vis.map(i=>allDates[i]);
  const mon=getMonday(weekOffset);
  const end=dparse(dates[dates.length-1]);

  /* banners */
  const bmap=new Map();
  dates.forEach(ds=>{
    D.quarters.filter(q=>q.start<=ds&&ds<=q.end).forEach(q=>{if(!bmap.has('q'+q.id))bmap.set('q'+q.id,{label:q.name,cls:'chip chip-q'});});
    D.periods.filter(p=>p.start<=ds&&ds<=p.end).forEach(p=>{if(!bmap.has('p'+p.id))bmap.set('p'+p.id,{label:p.name,cls:p.type==='holiday'?'chip chip-h':'chip chip-s'});});
  });
  const bd=document.getElementById('banners');
  if(bd){if(bmap.size){bd.style.display='inline-flex';bd.innerHTML=Array.from(bmap.values()).map(b=>`<span class="${b.cls}">${b.label}</span>`).join('');}else bd.style.display='none';}
  const wlblEl=document.getElementById('wlbl');
  if(wlblEl)wlblEl.textContent=mon.toLocaleDateString('ja-JP',{month:'short',day:'numeric'})+'\n〜\n'+end.toLocaleDateString('ja-JP',{month:'short',day:'numeric'});
  renderWeekDayToggles(wk);

  /* grid */
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';grid.style.height='';
  const outer=document.getElementById('cal-bg');
  const outerH=outer.clientHeight;
  const HEAD=38;
  const ch=Math.max(46,Math.floor((outerH-HEAD-4*3)/5));
  grid.style.gridTemplateRows=HEAD+'px repeat(5,'+ch+'px)';
  grid.style.gridTemplateColumns='38px repeat('+vis.length+',1fr)';

  const todayStr=dstr(new Date());
  const curT=THEMES.find(x=>x.id===D.theme)||THEMES[0];

  grid.appendChild(document.createElement('div'));
  vis.forEach(di=>{
    const ds=allDates[di];const dt=dparse(ds);
    const h=document.createElement('div');h.className='cal-hd';
    if(isHol(ds))h.style.color=curT.acc2||curT.acc;
    h.innerHTML=`<div class="cal-hd-day">${DAYS_ALL[di]}</div>`+
      `<div class="cal-hd-date${ds===todayStr?' today':''}">${dt.getDate()}</div>`;
    grid.appendChild(h);
  });

  for(let p=0;p<5;p++){
    const tc=document.createElement('div');tc.className='tcol';
    tc.innerHTML=`<span class="tcol-p">${PLBLS[p]}</span><span class="tcol-t">${PTIMES[p]}</span>`;
    grid.appendChild(tc);
    vis.forEach(di=>{
      const ds=allDates[di];const aqIds=qIdsFor(ds);
      const cell=document.createElement('div');cell.className='cell';
      if(isHol(ds)){cell.style.background=hexToRgba(curT.acc2||curT.acc,0.06);cell.style.borderColor=hexToRgba(curT.acc2||curT.acc,0.18);}
      const chg=D.scheds.find(s=>s.week===wk&&s.origDay===di&&s.origPeriod===p);
      const mv=D.scheds.find(s=>s.week===wk&&s.type==='move'&&s.newDay===di&&s.newPeriod===p);
      let cls=null;
      if(chg&&chg.type==='cancel'){}
      else if(chg&&chg.type==='move'){}
      else{cls=D.classes.find(c=>{if(c.isSingle)return c.singleDate===ds&&c.day===di&&c.period===p;const cIds=c.quarterIds||(c.quarterId?[c.quarterId]:[]);return c.day===di&&c.period===p&&(cIds.length===0||cIds.some(id=>aqIds.includes(id)));});}
      if(mv)cls=D.classes.find(c=>{const cIds=c.quarterIds||(c.quarterId?[c.quarterId]:[]);return c.day===mv.origDay&&c.period===mv.origPeriod&&(cIds.length===0||cIds.some(id=>aqIds.includes(id)));});
      const evs=eventsFor(ds);
      const memo=D.memos.find(m=>m.week===wk&&m.day===di&&m.period===p);
      if(chg&&chg.type==='cancel'){
        const b=document.createElement('div');b.className='cblk';b.style.cssText='background:rgba(229,57,53,.10);border-left:2px solid var(--red)';b.innerHTML='<div class="cblk-name" style="color:var(--red)">休講</div>';cell.appendChild(b);
        const oc=D.classes.find(c=>c.day===di&&c.period===p&&(!c.quarterId||aqIds.includes(c.quarterId)));
        if(oc)(id=>{cell.addEventListener('click',()=>openDetail(id));})(oc.id);
      }else if(cls){
        const hu=classAssigns(cls).some(a=>!a.done);const ci=cls.colorIdx%8;
        const b=document.createElement('div');b.className='cblk c'+ci;
        b.innerHTML=`<div class="cblk-name">${cls.name}</div><div class="cblk-sp"></div>`+
          `<div class="cblk-room">${mv?'[変更] ':''}${cls.room||''}</div>`+(hu?'<div class="cblk-dot"></div>':'');
        cell.appendChild(b);(id=>{cell.addEventListener('click',()=>openDetail(id));})(cls.id);
      }else if(memo){
        const b=document.createElement('div');b.className='memo-blk';b.innerHTML=`<div class="memo-txt">${memo.text}</div>`;cell.appendChild(b);
        ((_d,_p,_w)=>{cell.addEventListener('click',()=>openMemoForm(_d,_p,_w));})(di,p,wk);
      }else{
        ((_d,_p,_ds,_w)=>{cell.addEventListener('click',()=>openCellSheet(_d,_p,_ds,_w));})(di,p,ds,wk);
      }
      if(evs.length){const e=document.createElement('div');e.className='ev-dot';e.textContent='* '+evs.map(x=>x.name).join(' ');cell.appendChild(e);}
      grid.appendChild(cell);
    });
  }
}

/* ══════════ RENDER ASSIGNS ══════════ */
function renderAssigns(){
  const el=document.getElementById('assign-list');
  const srt=(a,b)=>{if(!a.due&&!b.due)return 0;if(!a.due)return 1;if(!b.due)return-1;return a.due.localeCompare(b.due);};
  const all=[...D.assignments.filter(a=>!a.done).sort(srt),...D.assignments.filter(a=>a.done).sort(srt)];
  if(!all.length){el.innerHTML='<div class="empty">課題はありません</div>';return;}
  el.innerHTML='';
  all.forEach(a=>{
    const cls=a.classId?D.classes.find(c=>c.id===a.classId):null;
    const lbl=cls?(cls.code?cls.name+' ('+cls.code+')':cls.name):'科目なし';
    const np=a.note&&a.note.length>30?a.note.slice(0,30)+'...':(a.note||'');
    const due=a.due?dueFmt(a.due):null;
    const div=document.createElement('div');div.className='aitem';
    const chk=document.createElement('div');chk.className='achk'+(a.done?' done':'');
    const info=document.createElement('div');info.className='ainfo';
    const del=document.createElement('button');del.className='adel';del.textContent='削除';
    info.innerHTML=`<div class="aname${a.done?' done':''}">${a.name}</div><div class="ameta">${lbl}</div>`+
      (due?`<span class="adue ${due.cls}">${due.txt}</span>`:'')+(np?`<div class="anote">${np}</div>`:'');
    div.append(chk,info,del);
    div.addEventListener('click',()=>openADetail(a.id));
    chk.addEventListener('click',e=>{e.stopPropagation();toggleAssign(a.id);});
    del.addEventListener('click',e=>{e.stopPropagation();deleteAssign(a.id);});
    el.appendChild(div);
  });
}

/* ══════════ RENDER SETTINGS ══════════ */
function renderSettings(){
  const cl=document.getElementById('classes-list');
  if(!D.classes.length){cl.innerHTML='<div style="padding:12px;text-align:center;color:var(--mut);font-size:12px">未登録</div>';}
  else{
    cl.innerHTML='';
    [...D.classes].sort((a,b)=>a.day!==b.day?a.day-b.day:a.period-b.period).forEach(c=>{
      const qIds=c.quarterIds||(c.quarterId?[c.quarterId]:[]);
      const qN=qIds.map(id=>{const q=D.quarters.find(x=>x.id===id);return q?q.name:'';}).filter(Boolean).join('・');
      const ci=c.colorIdx%8;const d=document.createElement('div');d.className='srow';
      d.innerHTML=`<div style="width:10px;height:10px;border-radius:50%;background:${CCOLORS[ci]};flex-shrink:0;margin-right:8px"></div>`+
        `<div class="srow-l"><div class="srow-name">${DAYS_ALL[c.day]}曜 ${PLBLS[c.period]} ${c.name}</div>`+
        `<div class="srow-sub">${c.room||'教室未設定'}${qN?' · '+qN:''}${c.isSingle?' · 単発':''}</div></div>`;
      d.addEventListener('click',()=>openDetail(c.id));cl.appendChild(d);
    });
  }
  function mkList(items,cid,cb){
    const el=document.getElementById(cid);el.innerHTML=items.length?'':`<div style="padding:12px;text-align:center;color:var(--mut);font-size:12px">未設定</div>`;
    items.forEach(it=>cb(el,it));
  }
  mkList([...D.periods].sort((a,b)=>a.start.localeCompare(b.start)),'period-list',(el,p)=>{
    const d=document.createElement('div');d.className='srow';
    d.innerHTML=`<div class="srow-l"><div class="srow-name">${p.name}</div><div class="srow-sub">${dfmt(p.start)} 〜 ${dfmt(p.end)}</div></div><span class="sbadge ${p.type==='holiday'?'bh':'bs'}">${p.type==='holiday'?'休業':'学期'}</span>`;
    d.addEventListener('click',()=>openPeriod(p.id));el.appendChild(d);
  });
  mkList([...D.quarters].sort((a,b)=>a.start.localeCompare(b.start)),'quarter-list',(el,q)=>{
    const d=document.createElement('div');d.className='srow';
    d.innerHTML=`<div class="srow-l"><div class="srow-name">${q.name}</div><div class="srow-sub">${dfmt(q.start)} 〜 ${dfmt(q.end)}</div></div><span class="sbadge bq">Q</span>`;
    d.addEventListener('click',()=>openQuarter(q.id));el.appendChild(d);
  });
  mkList([...D.events].sort((a,b)=>a.start.localeCompare(b.start)),'event-list',(el,e)=>{
    const d=document.createElement('div');d.className='srow';
    d.innerHTML=`<div class="srow-l"><div class="srow-name">${e.name}</div><div class="srow-sub">${dfmt(e.start)}${e.end&&e.end!==e.start?' 〜 '+dfmt(e.end):''}${e.note?' · '+e.note:''}</div></div><span class="sbadge be">行事</span>`;
    d.addEventListener('click',()=>openEvent(e.id));el.appendChild(d);
  });
}

function deleteAssign(id){if(!confirm('課題を削除しますか？'))return;D.assignments=D.assignments.filter(x=>x.id!==id);dbSave();renderAssigns();}
function deleteAssignInDetail(id,cid){if(!confirm('課題を削除しますか？'))return;D.assignments=D.assignments.filter(x=>x.id!==id);dbSave();hideModal('m-detail');openDetail(cid);}
function openADetail(id){const a=D.assignments.find(x=>x.id===id);if(!a)return;const cls=a.classId?D.classes.find(c=>c.id===a.classId):null;const due=a.due?dueFmt(a.due):null;let html=`<h2>${a.name}</h2>`;if(cls)html+=`<div class="dsec"><div class="dlbl">時間割</div><div class="dval">${cls.name+(cls.code?' ('+cls.code+')':'')}</div></div>`;if(due)html+=`<div class="dsec"><div class="dlbl">期限</div><div class="dval"><span class="adue ${due.cls}">${due.txt}</span></div></div>`;if(a.note)html+=`<div class="dsec"><div class="dlbl">メモ</div><div class="dval" style="font-size:13px;color:var(--mut);white-space:pre-wrap">${a.note}</div></div>`;const body=document.getElementById('adetail-body');body.innerHTML=html;const br=document.createElement('div');br.className='btn-row';const cb=document.createElement('button');cb.className='btn btn-s';cb.textContent='閉じる';cb.addEventListener('click',()=>hideModal('m-adetail'));const eb=document.createElement('button');eb.className='btn btn-p';eb.textContent='編集';eb.addEventListener('click',()=>{hideModal('m-adetail');openEditAssign(a.id);});br.append(cb,eb);body.appendChild(br);showModal('m-adetail');}

/* ══════════ PERIOD / QUARTER / EVENT ══════════ */
let _periodId=null,_quarterId=null,_eventId=null;
function openPeriod(id){_periodId=id||null;const p=id?D.periods.find(x=>x.id===id):null;document.getElementById('mperiod-title').textContent=p?'学期・休業期間を編集':'学期・休業期間を追加';document.getElementById('fp-name').value=p?p.name:'';document.getElementById('fp-type').value=p?p.type:'semester';document.getElementById('fp-start').value=p?p.start:'';document.getElementById('fp-end').value=p?p.end:'';document.getElementById('fp-delete').style.display=p?'block':'none';showModal('m-period');}
function openQuarter(id){_quarterId=id||null;const q=id?D.quarters.find(x=>x.id===id):null;document.getElementById('mquarter-title').textContent=q?'クォーターを編集':'クォーターを追加';document.getElementById('fq-name').value=q?q.name:'';document.getElementById('fq-start').value=q?q.start:'';document.getElementById('fq-end').value=q?q.end:'';document.getElementById('fq-delete').style.display=q?'block':'none';showModal('m-quarter');}
function openEvent(id){_eventId=id||null;const e=id?D.events.find(x=>x.id===id):null;document.getElementById('mevent-title').textContent=e?'行事を編集':'行事を追加';document.getElementById('fe-name').value=e?e.name:'';document.getElementById('fe-start').value=e?e.start:'';document.getElementById('fe-end').value=e?e.end||'':'';document.getElementById('fe-note').value=e?e.note||'':'';document.getElementById('fe-delete').style.display=e?'block':'none';showModal('m-event');}

/* ══════════ EVENT LISTENERS ══════════ */
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.ov').forEach(ov=>ov.addEventListener('click',e=>{if(e.target===ov)hideModal(ov.id);}));
  document.getElementById('cell-sheet').addEventListener('click',e=>{if(e.target===document.getElementById('cell-sheet'))hideSheet();});

  /* tab bar */
  document.querySelectorAll('.tab-item').forEach(btn=>btn.addEventListener('click',()=>switchTab(btn.dataset.tab)));

  /* week nav */

    /* week nav */


  /* assign add button */
  document.getElementById('btn-add-assign').addEventListener('click',openAddAssign);
  document.getElementById('btn-add-assign2').addEventListener('click',openAddAssign);

  /* cell sheet */
  document.getElementById('cs-class-btn').addEventListener('click',()=>{hideSheet();openClassForm(_shDay,_shPeriod,_shDs);});
  document.getElementById('cs-memo-btn').addEventListener('click',()=>{hideSheet();openMemoForm(_shDay,_shPeriod,_shWk);});
  document.getElementById('cs-cancel-btn').addEventListener('click',hideSheet);

  /* class form */
  document.getElementById('fc-single').addEventListener('change',toggleSingle);
  document.getElementById('fc-cancel').addEventListener('click',()=>hideModal('m-class'));
  document.getElementById('fc-save').addEventListener('click',()=>{
    const name=document.getElementById('fc-name').value.trim();if(!name){alert('時間割名を入力してください');return;}
    const isSingle=document.getElementById('fc-single').value==='1';
    const singleDate=document.getElementById('fc-sdate').value;
    if(isSingle&&!singleDate){alert('実施日を入力してください');return;}
    let day;if(isSingle){const dw=dparse(singleDate).getDay();day=dw===0?6:dw-1;}else{day=+document.getElementById('fc-day').value;}
    const period=+document.getElementById('fc-period').value;const qIds=getSelectedQIds();
    if(!isSingle){const conf=D.classes.find(c=>{if(c.isSingle||c.id===_clsId)return false;if(c.day!==day||c.period!==period)return false;const cIds=c.quarterIds||(c.quarterId?[c.quarterId]:[]);if(qIds.length===0||cIds.length===0)return true;return qIds.some(id=>cIds.includes(id));});if(conf){alert(DAYS_ALL[day]+'曜 '+(period+1)+'限には「'+conf.name+'」が既にあります');return;}}
    const data={name,code:document.getElementById('fc-code').value.trim(),day,period,isSingle,singleDate:isSingle?singleDate:null,quarterIds:qIds,quarterId:qIds.length?qIds[0]:null,room:document.getElementById('fc-room').value,teacher:document.getElementById('fc-teacher').value,email:document.getElementById('fc-email').value,office:document.getElementById('fc-office').value,note:document.getElementById('fc-note').value,colorIdx:_selColor};
    if(_clsId)Object.assign(D.classes.find(c=>c.id===_clsId),data);else D.classes.push({id:uid(),...data});
    dbSave();hideModal('m-class');renderCal();renderSettings();
  });
  document.getElementById('fc-delete').addEventListener('click',()=>{if(!_clsId)return;if(!confirm('この時間割を削除しますか？'))return;D.classes=D.classes.filter(x=>x.id!==_clsId);D.assignments.forEach(a=>{if(a.classId===_clsId)a.classId=null;});_clsId=null;dbSave();hideModal('m-class');renderCal();});

  /* assign form */
  document.getElementById('fa-cancel').addEventListener('click',()=>hideModal('m-assign'));
  document.getElementById('fa-save').addEventListener('click',()=>{const name=document.getElementById('fa-name').value.trim();if(!name){alert('課題名を入力してください');return;}const classId=document.getElementById('fa-class').value||null;const data={name,classId,due:document.getElementById('fa-due').value,note:document.getElementById('fa-note').value};if(_assignId)Object.assign(D.assignments.find(x=>x.id===_assignId),data);else D.assignments.push({id:uid(),done:false,...data});dbSave();hideModal('m-assign');renderAssigns();});
  document.getElementById('fa-delete').addEventListener('click',()=>{if(!_assignId)return;if(!confirm('課題を削除しますか？'))return;D.assignments=D.assignments.filter(x=>x.id!==_assignId);_assignId=null;dbSave();hideModal('m-assign');renderAssigns();});

  /* sched form */
  document.getElementById('fs-type').addEventListener('change',function(){document.getElementById('fs-move').style.display=this.value==='move'?'block':'none';});
  document.getElementById('fs-cancel').addEventListener('click',()=>hideModal('m-sched'));
  document.getElementById('fs-save').addEventListener('click',()=>{const cls=D.classes.find(c=>c.id===_schedClsId);const type=document.getElementById('fs-type').value;const wk=weekKey(weekOffset);const en={id:uid(),week:wk,type,origDay:cls.day,origPeriod:cls.period,note:document.getElementById('fs-note').value};if(type==='move'){en.newDay=+document.getElementById('fs-day').value;en.newPeriod=+document.getElementById('fs-period').value;}D.scheds.push(en);dbSave();hideModal('m-sched');renderCal();});

  /* memo form */
  document.getElementById('fm-cancel').addEventListener('click',()=>hideModal('m-memo'));
  document.getElementById('fm-save').addEventListener('click',()=>{const txt=document.getElementById('fm-text').value.trim();if(!txt){alert('メモを入力してください');return;}D.memos=D.memos.filter(m=>!(m.week===_memoWk&&m.day===_memoDay&&m.period===_memoPeriod));D.memos.push({week:_memoWk,day:_memoDay,period:_memoPeriod,text:txt});dbSave();hideModal('m-memo');renderCal();});
  document.getElementById('fm-delete').addEventListener('click',()=>{D.memos=D.memos.filter(m=>!(m.week===_memoWk&&m.day===_memoDay&&m.period===_memoPeriod));dbSave();hideModal('m-memo');renderCal();});

  /* settings */
  document.getElementById('btn-add-period').addEventListener('click',()=>openPeriod(null));
  document.getElementById('btn-add-quarter').addEventListener('click',()=>openQuarter(null));
  document.getElementById('btn-add-event').addEventListener('click',()=>openEvent(null));
  document.getElementById('toggle-sat-global').addEventListener('click',()=>{D.showSat=!D.showSat;dbSave();renderGlobalToggles();renderCal();});
  document.getElementById('toggle-sun-global').addEventListener('click',()=>{D.showSun=!D.showSun;dbSave();renderGlobalToggles();renderCal();});

  document.getElementById('fp-cancel').addEventListener('click',()=>hideModal('m-period'));
  document.getElementById('fp-save').addEventListener('click',()=>{const name=document.getElementById('fp-name').value.trim(),start=document.getElementById('fp-start').value,end=document.getElementById('fp-end').value;if(!name||!start||!end){alert('名称・開始日・終了日を入力してください');return;}const data={name,type:document.getElementById('fp-type').value,start,end};if(_periodId)Object.assign(D.periods.find(x=>x.id===_periodId),data);else D.periods.push({id:uid(),...data});dbSave();hideModal('m-period');renderSettings();renderCal();});
  document.getElementById('fp-delete').addEventListener('click',()=>{if(!_periodId)return;if(!confirm('削除しますか？'))return;D.periods=D.periods.filter(x=>x.id!==_periodId);_periodId=null;dbSave();hideModal('m-period');renderSettings();renderCal();});

  document.getElementById('fq-cancel').addEventListener('click',()=>hideModal('m-quarter'));
  document.getElementById('fq-save').addEventListener('click',()=>{const name=document.getElementById('fq-name').value.trim(),start=document.getElementById('fq-start').value,end=document.getElementById('fq-end').value;if(!name||!start||!end){alert('名称・開始日・終了日を入力してください');return;}if(_quarterId)Object.assign(D.quarters.find(x=>x.id===_quarterId),{name,start,end});else D.quarters.push({id:uid(),name,start,end});dbSave();hideModal('m-quarter');renderSettings();renderCal();});
  document.getElementById('fq-delete').addEventListener('click',()=>{if(!_quarterId)return;if(!confirm('削除しますか？'))return;D.quarters=D.quarters.filter(x=>x.id!==_quarterId);_quarterId=null;dbSave();hideModal('m-quarter');renderSettings();renderCal();});

  document.getElementById('fe-cancel').addEventListener('click',()=>hideModal('m-event'));
  document.getElementById('fe-save').addEventListener('click',()=>{const name=document.getElementById('fe-name').value.trim(),start=document.getElementById('fe-start').value;if(!name||!start){alert('行事名・開始日を入力してください');return;}const end=document.getElementById('fe-end').value||start;const data={name,start,end,note:document.getElementById('fe-note').value};if(_eventId)Object.assign(D.events.find(x=>x.id===_eventId),data);else D.events.push({id:uid(),...data});dbSave();hideModal('m-event');renderSettings();renderCal();});
  document.getElementById('fe-delete').addEventListener('click',()=>{if(!_eventId)return;if(!confirm('削除しますか？'))return;D.events=D.events.filter(x=>x.id!==_eventId);_eventId=null;dbSave();hideModal('m-event');renderSettings();renderCal();});

  /* resize */
  window.addEventListener('resize',()=>{applyBarPadding();renderCal();});
  if(window.ResizeObserver){let t;const ro=new ResizeObserver(()=>{clearTimeout(t);t=setTimeout(()=>{applyBarPadding();renderCal();},50);});ro.observe(document.getElementById('cal-bg'));ro.observe(document.getElementById('lg-bottom'));ro.observe(document.getElementById('tab-island'));}

  /* init */
  dbLoad();
  applyTheme(D.theme||'minimal');
  renderGlobalToggles();
  pillGl.init();
  initPillDrag();
  switchTab('cal');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{applyBarPadding();renderCal();}));
});
</script>
</body>
</html>
